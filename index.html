<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni Stock Pro - Full System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Mitr:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { font-family: 'Mitr', sans-serif; background: #fdfaf6; margin: 0; padding: 15px; color: #4a4a4a; }
        .container { max-width: 1300px; margin: auto; }
        .header-area { text-align: center; margin-bottom: 25px; }
        .brand-logo { width: 90px; height: 90px; border-radius: 50%; box-shadow: 0 6px 16px rgba(108, 92, 231, 0.2); border: 4px solid white; }
        .header-area h1 { color: #6c5ce7; font-weight: 600; margin: 10px 0 5px 0; font-size: 28px; }
        
        .main-layout { display: block; }
        @media(min-width: 950px) { 
            body { padding: 30px; }
            .main-layout { display: grid; grid-template-columns: 420px 1fr; gap: 25px; }
        }

        .card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 8px 24px rgba(164, 176, 190, 0.12); border: 2px solid #f1f2f6; height: fit-content; margin-bottom: 25px; }
        .card h3 { margin-top: 0; color: #2c3e50; border-bottom: 3px dashed #ffeaa7; padding-bottom: 10px; font-size: 18px; }

        input, select { width: 100%; padding: 11px; margin-bottom: 12px; border-radius: 12px; border: 2px solid #f1f2f6; box-sizing: border-box; background: #fafafa; font-size: 14px; font-family: 'Mitr', sans-serif; }
        input:focus, select:focus { border-color: #a29bfe; outline: none; background: white; }
        
        .variant-block { background: #fcf8ff; border: 2px solid #efebd6; padding: 12px; border-radius: 16px; margin-bottom: 10px; position: relative; }
        .variant-block h4 { margin: 0 0 8px 0; font-size: 13px; color: #6c5ce7; }
        .btn-remove-variant { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #ff7675; cursor: pointer; font-size: 12px; font-weight: bold; }

        .category-group { background: #fcfcfc; padding: 12px; border-radius: 14px; border: 2px dashed #dcdde1; margin-bottom: 12px; }
        .category-title { font-size: 12px; font-weight: bold; color: #6c5ce7; display: block; margin-bottom: 4px; }

        .btn-submit { width: 100%; background: #6c5ce7; color: white; border: none; padding: 14px; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; font-family: 'Mitr', sans-serif; box-shadow: 0 4px 12px rgba(108, 92, 231, 0.25); }
        .btn-add-variant { background: #fff2cc; color: #d97706; border: 2px solid #f59e0b; padding: 10px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; width: 100%; cursor: pointer; font-family: 'Mitr', sans-serif; }
        .btn-scan-item { background: #00cec9; color: white; padding: 6px 10px; border-radius: 8px; font-size: 11px; border: none; cursor: pointer; margin-bottom: 6px; display: inline-block; font-family: 'Mitr', sans-serif; }

        .table-wrapper { overflow-x: auto; background: white; border-radius: 24px; padding: 15px; box-shadow: 0 8px 24px rgba(164, 176, 190, 0.12); border: 2px solid #f1f2f6; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #f1f2f6; font-size: 14px; }
        th { background: #f9fafd; color: #747d8c; }

        .product-img { width: 55px; height: 55px; border-radius: 14px; object-fit: cover; }
        .badge-sku { font-family: 'Chakra Petch', sans-serif; background: #f1f2f6; padding: 3px 6px; border-radius: 8px; font-weight: bold; }
        .badge-variant { background: #f3e8ff; color: #7c3aed; padding: 2px 6px; border-radius: 6px; font-size: 11px; margin-right: 3px; display: inline-block; font-weight: bold; }
        
        .btn-action { border: none; padding: 6px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; margin-right: 2px; font-family: 'Mitr', sans-serif; }
        .btn-in { background: #e8fbf1; color: #10b981; }
        .btn-out { background: #fef2f2; color: #ef4444; }
        .btn-edit { background: #e0e7ff; color: #4f46e5; }
        .btn-del { background: #ffeae8; color: #eb4d4b; }

        /* 🧾 หน้าต่างใบเสร็จรับเงิน Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
        .receipt-box { background: white; width: 100%; max-width: 380px; border-radius: 20px; padding: 25px; text-align: center; border-top: 8px solid #6c5ce7; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .receipt-dash { border-top: 2px dashed #ccc; margin: 15px 0; }
        .receipt-box h2 { font-family: 'Mitr', sans-serif; margin: 0; color: #6c5ce7; font-size: 24px; }
        .receipt-box p { margin: 5px 0; font-size: 13px; color: #747d8c; }
        .receipt-details { text-align: left; font-family: 'Chakra Petch', sans-serif; font-size: 15px; line-height: 24px; color: #2c3e50; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='50' fill='%236c5ce7'/><circle cx='50' cy='52' r='26' fill='white'/><circle cx='38' cy='32' r='10' fill='white'/><circle cx='62' cy='32' r='10' fill='white'/><circle cx='38' cy='32' r='5' fill='%23ffb8b8'/><circle cx='62' cy='32' r='5' fill='%23ffb8b8'/><circle cx='44' cy='48' r='3' fill='%234a4a4a'/><circle cx='56' cy='48' r='3' fill='%234a4a4a'/><path d='M46 56 Q50 59 54 56' stroke='%234a4a4a' stroke-width='2.5' fill='none' stroke-linecap='round'/><rect x='36' y='64' width='28' height='20' rx='4' fill='%23ffeaa7'/><path d='M36 68 L50 76 L64 68' stroke='%23e67e22' stroke-width='1.5' fill='none'/></svg>" class="brand-logo" alt="Uni Stock Logo">
            <h1>Uni Stock Pro 🚀</h1>
            <p style="color:#a4b0be; font-size:13px; margin:0;">ระบบคลังสินค้า เพิ่มสินค้าหลัก แตกสีย่อย + ปุ่มลบสินค้า ครบวงจร</p>
        </div>

        <div id="scanner-container" class="card" style="display: none; max-width: 500px; margin: 0 auto 20px auto;">
            <h3>📷 สแกนบาร์โค้ดสินค้า</h3>
            <div id="interactive" style="width: 100%;"></div>
            <button onclick="stopScanner()" class="btn-submit" style="background:#ff7675; margin-top:10px;">❌ ปิดกล้อง</button>
        </div>

        <div class="main-layout">
            <div class="card">
                <h3 id="formTitle">✨ บันทึกสินค้าลงคลัง</h3>
                <form id="productForm">
                    <input type="hidden" id="editingId">
                    <input type="text" id="name" placeholder="ชื่อสินค้าหลัก (เช่น ซองใส่การ์ด)" required>
                    
                    <div class="category-group">
                        <span class="category-title">📁 หมวดหมู่เดิมที่มี:</span>
                        <select id="categorySelect" onchange="syncCategorySelect()">
                            <option value="">-- เลื่อนเลือกหมวดหมู่ --</option>
                        </select>
                        <span class="category-title" style="margin-top: 6px;">✏️ หรือเพิ่มหมวดหมู่ใหม่:</span>
                        <input type="text" id="categoryInput" placeholder="พิมพ์หมวดหมู่ใหม่ที่นี่..." style="margin-bottom:0;">
                    </div>

                    <label style="font-size: 12px; font-weight: bold; color: #747d8c; display: block; margin-bottom: 6px;">📸 รูปภาพสินค้าหลัก :</label>
                    <input type="file" id="imageFile" accept="image/*">
                    
                    <div class="receipt-dash"></div>
                    <h3 style="font-size: 15px; color: #6c5ce7; margin-bottom: 10px;">🎨 สี / ลายย่อยที่มีในชิ้นนี้</h3>
                    
                    <div id="variantsContainer"></div>

                    <button type="button" id="addVariantBtn" class="btn-add-variant" onclick="addVariantBlock()">➕ คลิกเพิ่ม สี / ตัวเลือกลายย่อย</button>
                    
                    <button type="submit" id="submitBtn" class="btn-submit">💾 บันทึกสินค้าและสีย่อยทั้งหมด</button>
                    <button type="button" id="cancelEdit
